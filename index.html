<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login System · Supabase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="page">

  <!-- LOGIN -->
  <div class="view" id="viewLogin">
    <div class="card">
      <div class="brand">
         <img src="logo_startup-removebg-preview.png" alt="Your Logo" width="160" height="160">
        <h1>Welcome back</h1>
        <p>Sign in to your account to continue</p>
      </div>
      <form id="formLogin" novalidate>
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email address</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </span>
            <input class="form-input" type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
          </div>
          <div class="field-error" id="errLoginEmail"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input class="form-input has-toggle" type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
            <button type="button" class="toggle-pw" data-target="loginPassword">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="field-error" id="errLoginPw"></div>
        </div>
        <div class="forgot-row">
          <button type="button" class="link" onclick="showView('viewReset')">Forgot password?</button>
        </div>
        <button class="btn btn-primary" type="submit" id="btnLogin">
          <span class="btn-label">Sign in</span>
          <span class="spinner"></span>
        </button>
      </form>
      <div class="divider">or</div>
      <div class="links">
        Don't have an account?&nbsp;
        <button class="link" onclick="showView('viewRegister')">Create one</button>
      </div>
    </div>
  </div>

  <!-- REGISTER -->
  <div class="view" id="viewRegister">
    <div class="card">
      <div class="brand">
        <div class="brand-icon">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <h1>Create account</h1>
        <p>Join us — it only takes a minute</p>
      </div>
      <form id="formRegister" novalidate>
        <div class="form-group">
          <label class="form-label" for="regName">Full name</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input class="form-input" type="text" id="regName" placeholder="Juan dela Cruz" autocomplete="name">
          </div>
          <div class="field-error" id="errRegName"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="regEmail">Email address</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </span>
            <input class="form-input" type="email" id="regEmail" placeholder="you@example.com" autocomplete="email">
          </div>
          <div class="field-error" id="errRegEmail"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="regPassword">Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input class="form-input has-toggle" type="password" id="regPassword" placeholder="Min. 6 characters" autocomplete="new-password">
            <button type="button" class="toggle-pw" data-target="regPassword">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="strength-wrap">
            <div class="strength-track"><div id="strengthBar"></div></div>
            <span id="strengthLabel"></span>
          </div>
          <div class="field-error" id="errRegPw"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="regPassword2">Confirm password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </span>
            <input class="form-input has-toggle" type="password" id="regPassword2" placeholder="Repeat your password" autocomplete="new-password">
            <button type="button" class="toggle-pw" data-target="regPassword2">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="field-error" id="errRegPw2"></div>
        </div>
        <button class="btn btn-primary" type="submit" id="btnRegister">
          <span class="btn-label">Create account</span>
          <span class="spinner"></span>
        </button>
      </form>
      <div class="divider">or</div>
      <div class="links">
        Already have an account?&nbsp;
        <button class="link" onclick="showView('viewLogin')">Sign in</button>
      </div>
    </div>
  </div>

  <!-- FORGOT PASSWORD -->
  <div class="view" id="viewReset">
    <div class="card">
      <div class="brand">
        <div class="brand-icon">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0 3 3L22 7l-3-3m-3.5 3.5L19 4"/>
          </svg>
        </div>
        <h1>Reset password</h1>
        <p>We'll send a reset link to your email</p>
      </div>
      <form id="formReset" novalidate>
        <div class="form-group">
          <label class="form-label" for="resetEmail">Email address</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </span>
            <input class="form-input" type="email" id="resetEmail" placeholder="you@example.com" autocomplete="email">
          </div>
          <div class="field-error" id="errResetEmail"></div>
        </div>
        <button class="btn btn-primary" type="submit" id="btnReset">
          <span class="btn-label">Send reset link</span>
          <span class="spinner"></span>
        </button>
      </form>
      <div class="divider">or</div>
      <div class="links">
        <button class="link" onclick="showView('viewLogin')">← Back to sign in</button>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="view" id="viewDashboard">
    <div class="card dash-card">
      <div class="dash-header">
        <div class="dash-avatar" id="dashAvatar">?</div>
        <div class="dash-greeting">
          <h2 id="dashName">Loading…</h2>
          <p id="dashEmail">—</p>
        </div>
      </div>
      <div class="dash-status">Authenticated</div>
      <div class="info-grid">
        <div class="info-row">
          <span class="info-label">User ID</span>
          <span class="info-value" id="dashId">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">Email</span>
          <span class="info-value" id="dashEmailRow">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">Member since</span>
          <span class="info-value" id="dashJoined">—</span>
        </div>
      </div>
      <button class="btn btn-danger" id="btnSignOut">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sign out
      </button>
    </div>
  </div>

</div><!-- /.page -->

<div class="toast" id="toast"></div>

<!-- Supabase JS v2 CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- supabase.js — client config & auth helpers -->
<script src="supabase.js"></script>

<!-- app.js -->
<script>
function showView(id) {
  ['viewLogin','viewRegister','viewReset','viewDashboard'].forEach(v => {
    const el = document.getElementById(v);
    if (el) el.classList.toggle('active', v === id);
  });
  clearAllErrors();
}

function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast toast--${type} show`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3500);
}

function setError(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.classList.toggle('visible', !!msg);
}

function clearAllErrors() {
  document.querySelectorAll('.field-error').forEach(e => {
    e.textContent = '';
    e.classList.remove('visible');
  });
}

function setLoading(btnId, on) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.disabled = on;
  const lbl = btn.querySelector('.btn-label');
  const sp  = btn.querySelector('.spinner');
  if (lbl) lbl.style.opacity = on ? '0' : '1';
  if (sp)  sp.style.display  = on ? 'block' : 'none';
}

function updateStrengthBar(pw) {
  const bar   = document.getElementById('strengthBar');
  const label = document.getElementById('strengthLabel');
  if (!bar || !label) return;
  let s = 0;
  if (pw.length >= 8)           s++;
  if (/[A-Z]/.test(pw))         s++;
  if (/[0-9]/.test(pw))         s++;
  if (/[^A-Za-z0-9]/.test(pw))  s++;
  const lvl = ['','Weak','Fair','Good','Strong'];
  const col = ['','#ef4444','#f97316','#eab308','#22c55e'];
  bar.style.width      = `${(s/4)*100}%`;
  bar.style.background = col[s] || '#334155';
  label.textContent    = pw.length ? (lvl[s] || 'Too short') : '';
  label.style.color    = col[s] || '#94a3b8';
}

function getInitials(name) {
  if (!name) return '?';
  return name.split(' ').slice(0,2).map(n => n[0]).join('').toUpperCase();
}

function renderDashboard(session) {
  if (!session) return;
  const meta  = session.user.user_metadata || {};
  const name  = meta.full_name || session.user.email.split('@')[0];
  const email = session.user.email;
  const date  = new Date(session.user.created_at).toLocaleDateString('en-PH', {
    year: 'numeric', month: 'long', day: 'numeric'
  });
  document.getElementById('dashAvatar').textContent   = getInitials(name);
  document.getElementById('dashName').textContent     = name;
  document.getElementById('dashEmail').textContent    = email;
  document.getElementById('dashEmailRow').textContent = email;
  document.getElementById('dashJoined').textContent   = date;
  document.getElementById('dashId').textContent       = session.user.id.slice(0,8) + '…';
  showView('viewDashboard');
}

function redirectToLanding() {
  window.location.href = 'Landing.html';
}

/* ── Register ── */
document.getElementById('formRegister').addEventListener('submit', async e => {
  e.preventDefault(); clearAllErrors();
  const name  = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pw    = document.getElementById('regPassword').value;
  const pw2   = document.getElementById('regPassword2').value;
  let ok = true;
  if (!name)         { setError('errRegName',  'Full name is required.');  ok = false; }
  if (!email)        { setError('errRegEmail', 'Email is required.');       ok = false; }
  if (pw.length < 6) { setError('errRegPw',    'Minimum 6 characters.');   ok = false; }
  if (pw !== pw2)    { setError('errRegPw2',   'Passwords do not match.');  ok = false; }
  if (!ok) return;

  setLoading('btnRegister', true);
  const { data, error } = await signUp(email, pw, name);
  setLoading('btnRegister', false);
  if (error) { setError('errRegEmail', error.message); return; }

  if (data.session) {
    showToast('🎉 Account created! Welcome.', 'success');
    redirectToLanding();
  } else {
    showToast('✉️ Check your email to confirm your account.', 'info');
    showView('viewLogin');
  }
});

/* ── Login ── */
document.getElementById('formLogin').addEventListener('submit', async e => {
  e.preventDefault(); clearAllErrors();
  const email = document.getElementById('loginEmail').value.trim();
  const pw    = document.getElementById('loginPassword').value;
  let ok = true;
  if (!email) { setError('errLoginEmail', 'Email is required.');    ok = false; }
  if (!pw)    { setError('errLoginPw',    'Password is required.'); ok = false; }
  if (!ok) return;

  setLoading('btnLogin', true);
  const { data, error } = await signIn(email, pw);
  setLoading('btnLogin', false);
  if (error) { setError('errLoginPw', error.message); return; }
  showToast('👋 Welcome back!', 'success');
  renderDashboard(data.session);
  
  // Show dashboard for 800ms then redirect to Landing.html
  setTimeout(() => {
    window.location.href = 'Landing.html';
  }, 800);
});

/* ── Forgot password ── */
document.getElementById('formReset').addEventListener('submit', async e => {
  e.preventDefault(); clearAllErrors();
  const email = document.getElementById('resetEmail').value.trim();
  if (!email) { setError('errResetEmail', 'Email is required.'); return; }
  setLoading('btnReset', true);
  const { error } = await resetPassword(email);
  setLoading('btnReset', false);
  if (error) { setError('errResetEmail', error.message); return; }
  showToast('📬 Password reset email sent!', 'success');
  showView('viewLogin');
});

function redirectAfterLogout() {
  // Mark this as a fresh logout
  sessionStorage.setItem('justLoggedOut', 'true');
  
  // Replace current history entry so user can't go back
  window.location.replace('index.html');
}

/* ── Sign out ── */
document.getElementById('btnSignOut').addEventListener('click', async () => {
  await signOut();
  showToast('You have been signed out.', 'info');
  
  // Use the redirect function to prevent browser back button
  redirectAfterLogout();
});

/* ── Password visibility toggle ── */
const eyeOn  = () => `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
const eyeOff = () => `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

document.querySelectorAll('.toggle-pw').forEach(btn => {
  btn.addEventListener('click', () => {
    const inp = document.getElementById(btn.dataset.target);
    if (!inp) return;
    const toText = inp.type === 'password';
    inp.type = toText ? 'text' : 'password';
    btn.innerHTML = toText ? eyeOff() : eyeOn();
  });
});

document.getElementById('regPassword').addEventListener('input', e => updateStrengthBar(e.target.value));

/* ── Init ── */
(async () => {
  // Check if user just logged out
  const justLoggedOut = sessionStorage.getItem('justLoggedOut');
  
  if (justLoggedOut) {
    // Fresh logout - show login page and clear the flag
    sessionStorage.removeItem('justLoggedOut');
    showView('viewLogin');
  } else {
    // Normal flow - check session and show appropriate view
    const session = await getSession();
    session ? renderDashboard(session) : showView('viewLogin');
  }
  
  onAuthChange((event, session) => {
    if (event === 'SIGNED_OUT' || !session) showView('viewLogin');
  });
})();
</script>
</body>
</html>
